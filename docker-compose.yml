services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_URL=${APP_URL}
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - AI_DEFAULT_PROVIDER=${AI_DEFAULT_PROVIDER:-openrouter}
      - AI_DEFAULT_MODEL=${AI_DEFAULT_MODEL:-anthropic/claude-3.5-sonnet}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_AUTH_TOKEN=${OPENROUTER_AUTH_TOKEN}
      - OPENROUTER_DEFAULT_MODEL=${OPENROUTER_DEFAULT_MODEL:-anthropic/claude-3.5-sonnet}
    volumes:
      - file_storage:/var/lib/zalo-crm/files
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - dokploy-network

volumes:
  file_storage:

networks:
  dokploy-network:
    external: true
